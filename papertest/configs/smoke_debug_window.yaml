papertest:
  # Fast debugging config: stop replay after a small window around the first backtest trade (~09:31/09:32 ET)
  data:
    symbols: ["TSLA"]
    start_date: "2024-12-20"
    end_date: "2024-12-20"
    interval: "1min"
    replay_speed: "INSTANT"
    simulate_market_hours: true

  buffers:
    size: 400
    warmup_required: 200

  # Same mean-reversion wiring as smoke_test.yaml
  strategies:
    - type: "mean_reversion"
      name: "MR_Simple"
      allocation_pct: 1.0
      parameters:
        lookback_period: 30
        scan_all_bars: false
        scan_interval: 1
        enable_regime_filter: false

        dislocation_minimum: 2.5
        dislocation_moderate: 2.5
        dislocation_strong: 3.0

        exhaustion_score_moderate: 55.0
        exhaustion_score_strong: 65.0

        rsi_oversold: 35
        rsi_overbought: 65

        base_position_pct: 0.1

        stop_loss_pct: -2.0
        take_profit_pct: 10.0
        min_profit_to_exit: 0.0

        enable_momentum_exit: true
        momentum_adx_threshold: 20.0
        momentum_rsi_overbought: 70.0
        momentum_rsi_oversold: 30.0
        momentum_volume_ratio: 0.7
        momentum_extended_zscore: 3.0

        zscore_entry_threshold: 1.5
        zscore_exit_threshold: 0.5

        enable_eod_liquidation: true
        eod_close_time: "15:55"
        enable_entry_cutoff: true
        entry_cutoff_time: "15:30"
        min_holding_bars: 5

  debug:
    # Stop early so runs complete in seconds and logs stay small
    # Pick one of the stop conditions (both can be set; either will stop).
    start_at_time: "09:25"
    stop_after_bars: 335
    stop_at_time: "09:33"
    # stop_at_time: "09:40"
    timezone: "America/New_York"


