[tool:pytest]
# Pytest configuration for StatArb Trading System

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.8

# Output configuration
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --maxfail=10
    --disable-warnings
    --color=yes
    --durations=10
    --asyncio-mode=auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests  
    performance: Performance tests
    slow: Slow running tests (deselect with '-m "not slow"')
    asyncio: Async tests
    database: Tests requiring database
    redis: Tests requiring Redis
    clickhouse: Tests requiring ClickHouse
    incremental: Tests that depend on previous test results

# Test filters
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Async configuration
asyncio_mode = auto

# Coverage configuration
# (Requires pytest-cov: pip install pytest-cov)
# --cov=new_structure
# --cov-report=html
# --cov-report=term
# --cov-fail-under=80

# Logging configuration
log_auto_indent = true
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout configuration (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Parallel execution (requires pytest-xdist)
# -n auto

# Test order (requires pytest-order)
# --order-scope=module
