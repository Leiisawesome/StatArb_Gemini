name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install project
        run: uv sync --locked --extra dev
      - name: Lint
        run: uv run ruff check l1_microstructure tests
      - name: Test without external systems
        run: uv run pytest -m "not external" --cov=l1_microstructure --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
