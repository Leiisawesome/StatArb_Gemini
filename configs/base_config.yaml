# Base Configuration for StatArb Infrastructure
# Default settings that apply to all environments

database:
  host: localhost
  port: 9000
  database: polygon_data
  user: default
  password: ""
  pool_size: 5
  max_execution_time: 300
  slow_query_threshold_ms: 1000

monitoring:
  metrics_buffer_size: 1000
  aggregation_interval_minutes: 1
  alert_thresholds:
    latency_warning_ms: 100
    latency_critical_ms: 500
    memory_warning_mb: 512
    memory_critical_mb: 1024
  enable_performance_tracking: true

messaging:
  max_history_size: 1000
  enable_history: true
  ai_channel: "ai_messages"
  default_queue_size: 100

strategies:
  pair_trading:
    default_lookback_days: 252
    min_correlation: 0.8
    max_pairs_per_strategy: 10
    position_sizing_method: "volatility_adjusted"
    
  risk_management:
    max_position_size: 0.1
    stop_loss_threshold: 0.05
    daily_var_limit: 0.02
    correlation_threshold: 0.95

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_rotation_mb: 100
  backup_count: 5

# AI/LLM Configuration
ai:
  enable_ai_agents: false
  max_concurrent_agents: 3
  agent_timeout_seconds: 30
  knowledge_base:
    enable_vector_db: false
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    max_context_tokens: 4000

# Feature Flags
features:
  real_time_processing: true
  advanced_analytics: true
  ai_integration: false
  performance_monitoring: true

# Market Data Settings
market_data:
  default_symbols: ["SPY", "QQQ", "IWM"]
  data_retention_days: 365
  real_time_feeds: ["polygon", "alpaca"]
  batch_size: 1000 