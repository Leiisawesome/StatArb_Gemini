# StatArb Gemini - Centralized Backtest Configuration
# ===================================================
# This file provides centralized configuration for all backtests
# to eliminate hardcoded dates and ensure consistency across strategies

# Default Trading Periods
trading_periods:
  # Single day testing (for quick validation)
  single_day:
    start_date: "2024-12-20"
    end_date: "2024-12-20"
    description: "Single day validation test"
  
  # One week testing
  one_week:
    start_date: "2024-12-16"
    end_date: "2024-12-20"
    description: "One week momentum/trend test"
  
  # February 2025 testing (as requested by user) - Extended to 1 month
  feb_2025:
    start_date: "2025-01-01"
    end_date: "2025-01-31"
    description: "January 2025 full month test period (extended from 5 days)"
  
  # January 2025 full month
  jan_2025:
    start_date: "2025-01-01"
    end_date: "2025-01-31"
    description: "January 2025 full month test"
  
  # Extended testing periods
  quarter:
    start_date: "2024-10-01"
    end_date: "2024-12-31"
    description: "Q4 2024 quarterly test"
  
  # Current default for new tests
  default: "single_day"

# Trading Session Configuration
trading_session:
  start_time: "09:30:00"
  end_time: "16:00:00"
  timezone: "US/Eastern"
  market_hours_only: true

# Universe Configuration
universes:
  # Single stock testing
  single_stock:
    symbols: ["TSLA"]
    description: "Single stock for strategy validation"
  
  # Tech stocks
  tech_stocks:
    symbols: ["AAPL", "MSFT", "GOOGL", "AMZN", "NVDA"]
    description: "Major technology stocks"
  
  # ETF pairs for pairs trading
  etf_pairs:
    pairs:
      - ["SPY", "QQQ"]
      - ["GLD", "GDX"]
      - ["XLF", "XLK"]
    description: "ETF pairs for statistical arbitrage"
  
  # Momentum universe
  momentum_universe:
    symbols: ["TSLA", "NVDA", "AMD", "AAPL"]
    description: "High momentum stocks"
  
  # Mean reversion universe
  mean_reversion_universe:
    symbols: ["TSLA", "SPY", "QQQ"]
    description: "Mean reverting instruments"
  
  # Default universe
  default: "single_stock"

# Data Configuration
data_config:
  # Data frequencies
  frequencies:
    high_freq: "1min"
    medium_freq: "5min"
    low_freq: "15min"
    daily: "1d"
  
  # Default frequency per strategy
  strategy_defaults:
    momentum: "1min"
    mean_reversion: "5min"  # Optimal from analysis
    pairs_trading: "5min"   # Optimal from analysis
  
  # Data source configuration
  source:
    primary: "clickhouse"
    fallback: "synthetic"
    validation_enabled: true

# Capital Configuration
capital_config:
  # Base capital amounts
  base_capital: 100000.0
  
  # Strategy-specific allocations
  strategy_allocations:
    momentum: 100000.0
    mean_reversion: 100000.0
    pairs_trading: 100000.0
  
  # Risk limits
  max_position_size_pct: 0.15
  max_portfolio_risk: 0.20

# Risk Management Configuration
risk_config:
  # Portfolio level
  portfolio:
    max_drawdown_limit: 0.15
    max_var_pct: 0.05
    target_volatility: 0.12
  
  # Position level
  position:
    max_position_size: 0.15
    default_stop_loss: 0.03
    default_take_profit: 0.06
  
  # Strategy specific risk adjustments
  strategy_multipliers:
    momentum:
      stop_loss_multiplier: 1.5
      take_profit_multiplier: 2.0
    mean_reversion:
      stop_loss_multiplier: 1.0
      take_profit_multiplier: 1.5
    pairs_trading:
      stop_loss_multiplier: 0.8
      take_profit_multiplier: 1.2

# Performance Configuration
performance_config:
  # Benchmark
  benchmark_symbol: "SPY"
  
  # Reporting frequency
  reporting_frequency: "daily"
  
  # Metrics to calculate
  metrics:
    - "total_return"
    - "sharpe_ratio"
    - "max_drawdown"
    - "win_rate"
    - "profit_factor"
    - "calmar_ratio"
    - "sortino_ratio"
  
  # Risk-free rate for Sharpe calculation
  risk_free_rate: 0.02

# Backtest Scenarios
scenarios:
  # Quick validation
  quick_test:
    period: "single_day"
    universe: "single_stock"
    frequency: "5min"
    capital: 50000.0
    description: "Quick strategy validation"
  
  # Standard test
  standard_test:
    period: "one_week"
    universe: "momentum_universe"
    frequency: "5min"
    capital: 100000.0
    description: "Standard weekly backtest"
  
  # Extended test
  extended_test:
    period: "jan_2025"
    universe: "tech_stocks"
    frequency: "5min"
    capital: 200000.0
    description: "Extended monthly backtest"
  
  # User requested test - Extended to 1 month
  feb_2025_test:
    period: "feb_2025"
    universe: "momentum_universe"
    frequency: "5min"
    capital: 100000.0
    description: "January 2025 full month test (extended from 5 days)"
  
  # Pairs trading test
  pairs_test:
    period: "jan_2025"
    universe: "etf_pairs"
    frequency: "5min"
    capital: 100000.0
    description: "Pairs trading statistical arbitrage"

# Environment Configuration
environment:
  # Logging
  log_level: "INFO"
  log_format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
  
  # Performance
  enable_optimizations: true
  parallel_processing: true
  cache_data: true
  
  # Output
  save_results: true
  results_directory: "results/"
  plot_results: false

# Strategy Specific Configuration
strategy_configs:
  momentum:
    # Momentum specific parameters
    lookback_periods: [10, 20, 50]
    momentum_threshold: 0.02
    volume_confirmation: true
    regime_aware: true
    
  mean_reversion:
    # Mean reversion specific parameters
    lookback_window: 60
    entry_zscore: 2.0
    exit_zscore: 0.5
    ou_process: true
    regime_aware: true
    
  pairs_trading:
    # Pairs trading specific parameters
    cointegration_lookback: 252
    entry_zscore: 2.0
    exit_zscore: 0.5
    max_pairs_active: 3
    hedge_ratio_method: "kalman"
    regime_aware: true

# Version and Metadata
version: "1.0.0"
created_date: "2025-01-08"
description: "Centralized backtest configuration for StatArb Gemini system"
author: "StatArb Gemini Team"
