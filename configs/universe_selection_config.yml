# Selection Constraints
# ====================
selection_constraints:
  # Portfolio size limits
  max_instruments: 10
  min_instruments: 3
  
  # Concentration limits
  max_sector_concentration: 0.40  # 40% max in any sector
  max_individual_weight: 0.25     # 25% max per instrument
  min_individual_weight: 0.05     # 5% min per instrument
  
  # Quality thresholds
  min_liquidity_score: 0.30
  min_quality_score: 0.40
  max_correlation: 0.80
  
  # Risk limits
  max_portfolio_volatility: 0.25
  max_individual_volatility: 0.50
  max_beta: 2.0
  min_beta: 0.2

# Strategy-Specific Preferences
# =============================
strategy_preferences:
  momentum:
    # Fitness thresholds
    min_fitness_score: 0.50
    preferred_fitness_score: 0.70
    
    # Statistical preferences
    preferred_autocorr_range: [0.05, 0.25]  # Positive autocorrelation
    preferred_volatility_range: [0.20, 0.40]
    preferred_momentum_persistence: 0.60
    
    # Regime preferences
    optimal_regimes: ["trending", "bullish", "momentum_favorable"]
    avoid_regimes: ["sideways", "high_volatility"]
    
    # Weighting preferences
    fitness_weight: 0.40
    regime_weight: 0.30
    liquidity_weight: 0.20
    risk_weight: 0.10
  
  mean_reversion:
    # Fitness thresholds
    min_fitness_score: 0.50
    preferred_fitness_score: 0.70
    
    # Statistical preferences
    preferred_autocorr_range: [-0.25, 0.05]  # Negative autocorrelation
    preferred_volatility_range: [0.15, 0.35]
    preferred_half_life_range: [5, 30]        # Days
    preferred_ou_theta_range: [0.1, 0.5]
    
    # Regime preferences
    optimal_regimes: ["sideways", "volatile", "mean_reverting"]
    avoid_regimes: ["strong_trending", "momentum_favorable"]
    
    # Weighting preferences
    fitness_weight: 0.35
    regime_weight: 0.25
    statistical_weight: 0.25
    risk_weight: 0.15
  
  pairs_trading:
    # Fitness thresholds
    min_fitness_score: 0.40
    preferred_fitness_score: 0.65
    
    # Statistical preferences
    min_cointegration_score: 0.60
    preferred_correlation_range: [0.60, 0.90]
    max_correlation_instability: 0.30
    
    # Regime preferences
    optimal_regimes: ["stable", "low_volatility", "sideways"]
    avoid_regimes: ["high_volatility", "regime_transition"]
    
    # Weighting preferences
    statistical_weight: 0.40
    liquidity_weight: 0.25
    fitness_weight: 0.20
    risk_weight: 0.15

# Market Condition Adjustments
# ============================
market_condition_adjustments:
  high_volatility:  # VIX > 25
    liquidity_weight_boost: 0.10
    quality_score_boost: 0.05
    max_individual_weight: 0.20  # Reduce concentration
    
  market_stress:    # Stress indicators high
    min_liquidity_score: 0.50    # Increase liquidity requirement
    max_correlation: 0.70        # Reduce correlation limit
    defensive_bias: 0.10         # Favor defensive stocks
    
  low_liquidity:    # Market liquidity conditions poor
    min_liquidity_score: 0.60
    max_instruments: 8           # Reduce universe size
    liquidity_weight_boost: 0.15

# Regime-Specific Universes
# =========================
regime_specific_preferences:
  trending:
    preferred_sectors: ["technology", "consumer"]
    boost_momentum_fitness: 0.15
    preferred_beta_range: [1.0, 1.5]
    
  sideways:
    preferred_sectors: ["financial", "healthcare"]
    boost_mean_reversion_fitness: 0.15
    preferred_beta_range: [0.7, 1.2]
    
  volatile:
    preferred_sectors: ["healthcare", "consumer"]
    increase_quality_threshold: 0.10
    reduce_max_volatility: 0.05
    
  low_volatility:
    preferred_sectors: ["technology", "financial"]
    allow_higher_concentration: 0.05
    boost_momentum_fitness: 0.10

# Historical Analysis Parameters
# ==============================
historical_analysis:
  # Data requirements
  min_history_days: 252          # 1 year minimum
  preferred_history_days: 912    # 2.5 years preferred
  
  # Analysis windows
  short_term_window: 60          # 60 days
  medium_term_window: 252        # 1 year
  long_term_window: 504          # 2 years
  
  # Regime analysis
  regime_detection_window: 100   # Days for regime detection
  regime_stability_threshold: 0.70
  
  # Performance attribution
  min_regime_periods: 20         # Minimum periods per regime
  significance_level: 0.05       # Statistical significance

# Validation Parameters
# ====================
validation_config:
  # Backtesting
  in_sample_ratio: 0.70          # 70% for training
  min_validation_periods: 50     # Minimum out-of-sample periods
  
  # Performance thresholds
  min_sharpe_ratio: 0.50
  max_drawdown_threshold: -0.25
  min_win_rate: 0.45
  
  # Statistical tests
  significance_level: 0.05
  min_statistical_power: 0.80
  
  # Stability requirements
  min_selection_stability: 0.70
  max_weight_drift: 0.20

# Output Configuration
# ===================
output_config:
  # File paths
  results_directory: "results/universe_selection/"
  analysis_directory: "results/universe_selection/analysis/"
  validation_directory: "results/validation_reports/"
  
  # File naming
  timestamp_format: "%Y%m%d_%H%M%S"
  include_strategy_in_filename: true
  include_regime_in_filename: true
  
  # Content options
  save_detailed_analysis: true
  save_fitness_rankings: true
  save_validation_reports: true
  
  # Format options
  primary_format: "yaml"
  backup_formats: ["json"]
  compression: false

# Integration Settings
# ===================
integration:
  # Backtest integration
  auto_update_backtest_configs: true
  backtest_config_path: "configs/backtest_config.yml"
  
  # Real-time integration
  selection_refresh_frequency: "daily"  # daily, weekly, monthly
  regime_update_frequency: "hourly"
  
  # Monitoring
  enable_performance_monitoring: true
  alert_on_validation_failure: true
  log_selection_changes: true

# Advanced Features
# ================
advanced_features:
  # Machine learning
  enable_ml_scoring: false
  ml_model_path: "models/universe_selection_model.pkl"
  
  # Dynamic adaptation
  enable_adaptive_weights: true
  adaptation_learning_rate: 0.05
  
  # Cross-validation
  enable_walk_forward_analysis: true
  walk_forward_window: 60  # Days
  
  # Ensemble methods
  enable_ensemble_selection: false
  ensemble_methods: ["fitness", "regime", "statistical"]
