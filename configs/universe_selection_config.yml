# Universe Selection Configuration
# ================================
# 
# This configuration file defines parameters for the intelligent universe
# selection system, including candidate universes, selection criteria,
# and strategy-specific preferences.

# Metadata
config_version: "1.0.0"
last_updated: "2025-01-27T12:00:00Z"
description: "Comprehensive universe selection configuration for StatArb Gemini"

