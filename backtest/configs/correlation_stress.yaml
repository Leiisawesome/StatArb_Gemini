# Correlation Stress Testing Configuration
# ==========================================
# Test portfolio behavior under correlation breakdown scenarios.

experiment_name: "Correlation_Stress_AAPL_Jan3"
experiment_type: "correlation_stress_testing"

# Market data
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"
end_date: "2024-01-03"

# Portfolio settings
initial_capital: 1000000
allow_shorts: true
max_position_size: 0.10
max_concentration: 0.15

# Base strategy configuration
strategy:
  type: "mean_reversion"
  name: "MR_Correlation"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 1.5
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02

# Correlation stress scenarios
correlation_scenarios:
  - name: "normal_correlations"
    correlation_adjustment: 1.0
    description: "Historical correlation levels"
  - name: "high_correlations"
    correlation_adjustment: 1.5
    description: "Crisis-level correlations (0.8-0.9)"
  - name: "correlation_breakdown"
    correlation_adjustment: 2.0
    description: "Diversification fails, all correlations spike"
  - name: "perfect_correlation"
    correlation_adjustment: 3.0
    description: "All assets move in lockstep"

# Risk management
min_signal_confidence: 0.50

