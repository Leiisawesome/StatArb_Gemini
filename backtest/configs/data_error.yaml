# Data Error Simulation Configuration
# ====================================
# Test strategy robustness against data quality issues.

experiment_name: "Data_Error_AAPL_Jan3"
experiment_type: "data_error_simulation"

# Market data
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"
end_date: "2024-01-03"

# Portfolio settings
initial_capital: 1000000
allow_shorts: true
max_position_size: 0.10
max_concentration: 0.15

# Base strategy configuration
strategy:
  type: "mean_reversion"
  name: "MR_DataError"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 1.5
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02

# Data error scenarios
data_error_scenarios:
  - name: "clean_data"
    error_type: null
    error_rate: 0.0
    description: "Baseline: no data errors"
  - name: "missing_data_low"
    error_type: "missing"
    error_rate: 0.01
    description: "1% missing data points"
  - name: "missing_data_high"
    error_type: "missing"
    error_rate: 0.05
    description: "5% missing data points"
  - name: "outliers_low"
    error_type: "outliers"
    error_rate: 0.005
    description: "0.5% price outliers"
  - name: "outliers_high"
    error_type: "outliers"
    error_rate: 0.02
    description: "2% price outliers"
  - name: "stale_data"
    error_type: "stale"
    error_rate: 0.03
    description: "3% stale quotes (repeated prices)"
  - name: "mixed_errors"
    error_type: "mixed"
    error_rate: 0.05
    description: "Mixed: 5% combined errors"

# Risk management
min_signal_confidence: 0.50

