# Replay Configuration Example
# ===============================
# Example configuration for historical data replay testing
# Shows how to customize replay engine settings via config

experiment_name: "Replay_Test"
experiment_type: "replay_test"

# Data configuration for replay mode
data:
  mode: "replay"
  symbols: ["TSLA"]  # Single symbol for quick testing
  start_date: "2024-12-20"
  end_date: "2024-12-20"
  interval: "1min"

  # Replay-specific configuration
  replay:
    speed: "FAST_10X"  # 10x speed for faster testing
    enable_progress_tracking: true
    progress_log_interval: 5  # Log progress every 5 seconds
    enable_market_hours_simulation: true
    enable_pause_resume: true
    max_replay_speed: 1000.0

# Connection settings (if needed)
connection:
  clickhouse_host: "localhost"
  clickhouse_port: 8123
  clickhouse_user: "default"
  clickhouse_password: ""
  clickhouse_database: "market_data"