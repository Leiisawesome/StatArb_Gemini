# Liquidity Stress Testing Configuration
# ========================================
# Test strategy resilience under various liquidity constraints.

experiment_name: "Liquidity_Stress_AAPL_Jan3"
experiment_type: "liquidity_stress_testing"

# Market data
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"
end_date: "2024-01-03"

# Portfolio settings
initial_capital: 1000000
allow_shorts: true
max_position_size: 0.10
max_concentration: 0.15

# Base strategy configuration
strategy:
  type: "mean_reversion"
  name: "MR_Liquidity"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 1.5
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02

# Liquidity stress scenarios
liquidity_scenarios:
  - name: "baseline"
    volume_multiplier: 1.0
    spread_multiplier: 1.0
    slippage_multiplier: 1.0
  - name: "low_liquidity"
    volume_multiplier: 0.5
    spread_multiplier: 2.0
    slippage_multiplier: 1.5
  - name: "crisis_liquidity"
    volume_multiplier: 0.25
    spread_multiplier: 4.0
    slippage_multiplier: 3.0
  - name: "flash_crash"
    volume_multiplier: 0.10
    spread_multiplier: 10.0
    slippage_multiplier: 5.0

# Risk management
min_signal_confidence: 0.50
base_slippage_bps: 2.0
max_spread_bps: 25.0

