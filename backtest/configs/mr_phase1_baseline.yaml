# Mean Reversion Optimization - Phase 1: Baseline Testing
# Purpose: Enable strategy testing with position tracking fix
# Date: 2024-11-24
# Status: ACTIVE - For Phase 1 parameter sweep

name: "MR_Phase1_Baseline"
experiment_type: "baseline_backtest"

# ============================================================================
# BACKTEST CONFIGURATION
# ============================================================================
backtest:
  backtest_name: "mr_phase1_baseline"
  start_date: "2024-01-02"
  end_date: "2024-01-02"  # 1 day for quick verification
  initial_capital: 1000000.0
  symbols:
    - AAPL
    - TSLA
    - NVDA
  
  # Market data configuration
  data_source: "clickhouse"
  timeframe: "1min"
  
  # Execution simulation
  execution:
    fill_model: "realistic"
    slippage_model: "adaptive"
    commission_per_share: 0.001

# ============================================================================
# RISK LIMITS - RELAXED FOR PHASE 1 TESTING
# ============================================================================
# Note: These limits are intentionally relaxed to enable signal execution
# Production limits will be tighter after optimization
risk_config:
  # Position limits (relaxed from 15% to 30%)
  max_position_size: 0.30  # 30% of portfolio per position
  
  # Concentration limits (relaxed from 20% to 40%)
  position_concentration_limit: 0.40  # 40% max concentration
  
  # Portfolio limits
  max_positions: 5
  max_leverage: 1.0
  
  # Daily limits
  max_daily_loss: 0.05  # 5% max daily loss
  max_daily_trades: 100
  
  # VaR limits
  max_portfolio_var: 0.10  # 10% VaR limit

# ============================================================================
# COMPLIANCE CONFIGURATION
# ============================================================================
compliance:
  enable_pre_trade_checks: true
  enable_restricted_list: false  # Disabled for testing
  enable_insider_blackout: false  # Disabled for testing
  enable_concentration_checks: true
  
  # Concentration limits (aligned with risk_config)
  max_position_concentration: 0.40  # 40%

# ============================================================================
# STRATEGY CONFIGURATION - MEAN REVERSION
# ============================================================================
strategies:
  - type: "mean_reversion"
    name: "enhanced_mean_reversion_1"
    enabled: true
    allocation_pct: 1.0  # 100% of capital
    
    parameters:
      # Core mean reversion parameters
      lookback_period: 20  # 20 bars for mean calculation
      zscore_entry_threshold: 2.0  # Entry at 2 std devs
      zscore_exit_threshold: 0.5   # Exit when near mean
      
      # RSI parameters
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      
      # Bollinger Bands parameters
      bb_period: 20
      bb_std_dev: 2.0
      
      # Position sizing (5% base position)
      base_position_pct: 0.05  # 5% of portfolio per trade
      max_position_pct: 0.30   # Max 30% (aligned with risk limits)
      volatility_adjust: true
      
      # Risk management
      stop_loss_atr_multiple: 2.0
      profit_target_ratio: 2.0  # 2:1 reward/risk
      max_holding_period: 50    # Max 50 bars
      
      # Confidence thresholds
      min_confidence: 0.60  # 60% minimum confidence
      
      # Regime filtering
      enable_regime_filter: false  # Disabled for Phase 1
      
      # Historical scanning
      scan_all_bars: true  # Enable for backtesting
      scan_interval: 1     # Evaluate every bar

# ============================================================================
# ANALYTICS CONFIGURATION
# ============================================================================
analytics:
  enable_performance_tracking: true
  enable_trade_analysis: true
  enable_risk_attribution: true
  
  # Metrics to calculate
  calculate_sharpe: true
  calculate_sortino: true
  calculate_max_drawdown: true
  calculate_win_rate: true

# ============================================================================
# LOGGING AND OUTPUT
# ============================================================================
logging:
  log_level: "INFO"
  log_signals: true
  log_trades: true
  log_rejections: true  # Important for debugging

output:
  save_trade_log: true
  save_performance_report: true
  save_regime_log: false  # Regime filtering disabled
  
  # Output directory
  results_dir: "backtest/results"
  
  # Report formats
  export_json: true
  export_csv: true

# ============================================================================
# PHASE 1 TESTING NOTES
# ============================================================================
# This configuration is designed for Phase 1 baseline testing with:
# 
# 1. ✅ Position tracking fix applied (check disabled)
# 2. ✅ Relaxed limits (30% position, 40% concentration)
# 3. ✅ Quick test period (1 day for verification)
# 4. ✅ All compliance checks enabled except restrictive ones
# 
# Expected Results:
# - 40%+ signal-to-trade ratio (60+ trades)
# - First profitable backtest (return > 0%)
# - Valid parameter sweep baseline
# 
# Next Steps:
# - Run parameter sweep (27 combinations)
# - Identify optimal thresholds
# - Tighten limits for Phase 2


