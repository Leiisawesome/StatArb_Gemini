# Regime-Specific Testing Configuration
# =======================================
# Test strategy performance segmented by market regime.

experiment_name: "Regime_Specific_AAPL_Jan"
experiment_type: "regime_specific_testing"

# Market data (longer period to cover multiple regimes)
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-02"
end_date: "2024-01-05"  # 4 days to split into 3 regimes

# Portfolio settings
initial_capital: 1000000
allow_shorts: true
max_position_size: 0.10
max_concentration: 0.15

# Base strategy configuration
strategy:
  type: "mean_reversion"
  name: "MR_Regime"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 1.5
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02

# Target regimes to test
target_regimes:
  - "low_volatility"
  - "normal_volatility"
  - "high_volatility"

# Risk management
min_signal_confidence: 0.50
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7

