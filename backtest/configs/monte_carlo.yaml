# Monte Carlo Simulation Configuration
# =====================================
# Probabilistic outcome distribution using random parameter sampling.

experiment_name: "Monte_Carlo_AAPL_Jan3"
experiment_type: "monte_carlo_simulation"

# Market data (single day for quick test)
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"
end_date: "2024-01-03"

# Portfolio settings
initial_capital: 1000000
allow_shorts: true
max_position_size: 0.10
max_concentration: 0.15

# Base strategy configuration
strategy:
  type: "mean_reversion"
  name: "MR_MonteCarlo"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 2.0  # Will be randomized
    zscore_exit_threshold: 0.5   # Will be randomized
    rsi_oversold: 30
    rsi_overbought: 70
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02      # Will be randomized

# Monte Carlo specific settings
monte_carlo:
  n_simulations: 20  # Start with 20 for quick test (can increase to 100-1000)

# Parameter distributions for random sampling
parameter_distributions:
  zscore_entry_threshold:
    type: "uniform"
    min: 1.5
    max: 2.5
    dtype: "float"
  
  zscore_exit_threshold:
    type: "uniform"
    min: 0.3
    max: 0.7
    dtype: "float"
  
  base_position_pct:
    type: "uniform"
    min: 0.01
    max: 0.05
    dtype: "float"
  
  lookback:
    type: "choice"
    choices: [15, 20, 25, 30]
    dtype: "int"

# Risk management
min_signal_confidence: 0.50
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7

