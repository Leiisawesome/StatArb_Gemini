# Survivorship Bias Testing Configuration
# =========================================
# Test strategy with realistic survivorship bias scenarios.

experiment_name: "Survivorship_Bias_AAPL_Jan3"
experiment_type: "survivorship_bias_testing"

# Market data
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"
end_date: "2024-01-03"

# Portfolio settings
initial_capital: 1000000
allow_shorts: true
max_position_size: 0.10
max_concentration: 0.15

# Base strategy configuration
strategy:
  type: "mean_reversion"
  name: "MR_Survivorship"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 1.5
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02

# Survivorship bias scenarios
survivorship_scenarios:
  - name: "no_failures"
    failure_rate: 0.0
    description: "Baseline: no delistings"
  - name: "single_delisting"
    failure_rate: 0.05
    description: "5% of positions fail"
  - name: "multiple_failures"
    failure_rate: 0.10
    description: "10% of positions fail"
  - name: "crisis_failures"
    failure_rate: 0.25
    description: "Crisis: 25% of positions fail"

# Risk management
min_signal_confidence: 0.50

