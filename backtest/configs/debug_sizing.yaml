# DEBUG: Ultra-Aggressive Test Config
# ====================================
# Extremely relaxed thresholds to FORCE signal generation

experiment_name: "Debug_Position_Sizing"
experiment_type: "baseline_backtest"

symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"  # Good data day
end_date: "2024-01-03"    # Single day

initial_capital: 1000000
allow_shorts: false
max_position_size: 0.10
max_concentration: 0.15

# ULTRA-AGGRESSIVE Mean Reversion
strategy:
  type: "mean_reversion"
  name: "MR_Debug"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 0.5       # ULTRA RELAXED (was 2.0)
    zscore_exit_threshold: 0.1        # ULTRA RELAXED (was 0.5)
    rsi_oversold: 60                   # ULTRA RELAXED (was 30)
    rsi_overbought: 40                 # ULTRA RELAXED (was 70)
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    base_position_pct: 0.02            # 2% position size

min_signal_confidence: 0.30            # ULTRA RELAXED (was 0.60)
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 1.0

base_spread_bps: 0.5
commission_per_share: 0.0005

log_level: "INFO"
save_trade_log: true

