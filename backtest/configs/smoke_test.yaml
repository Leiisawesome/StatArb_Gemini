# OPTION 3: SES Pairs Trading Strategy (ACTIVE)
# NOTE: Pairs trading requires cointegrated assets. BTC/ETH may not always be
# cointegrated on a single day. For testing, try:
# - Longer date range (multi-day) for statistical significance
# - Assets known to be cointegrated (e.g., SPY/VOO, GLD/IAU)
# - Crypto pairs that historically show cointegration
strategies:
  - type: "ses_pairs_trading"
    name: "SES_Pairs"
    allocation_pct: 1.0
    parameters:
      # Asset universe for pair selection
      asset_universe: ["BTC", "ETH"]
      
      # Pair selection thresholds (RELAXED for smoke test)
      lookback_period: 60               # REDUCED for smoke test (normally 252)
      min_correlation: 0.5              # Minimum correlation for pair consideration
      correlation_threshold: 0.4        # Correlation to maintain pair
      cointegration_threshold: 0.15     # RELAXED from 0.05 for testing
      
      # Entry/exit Z-scores (RELAXED for more signals)
      entry_zscore: 1.5                 # Entry when zscore exceeds this
      exit_zscore: 0.5                  # Exit when zscore drops to this
      stop_loss_zscore: 3.0
      
      # Position management
      max_pairs: 2
      position_size_pct: 0.05
      max_holding_period: 10            # REDUCED for smoke test
      
      # Scanning mode
      scan_all_bars: false
      scan_interval: 1

# Minimal risk management
min_signal_confidence: 0.40  # RELAXED for momentum (uses composite signals)
max_position_size: 0.40      # Higher for testing

# Disable some features for speed
save_trade_log: false
save_regime_log: false

