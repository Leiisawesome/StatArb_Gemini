# Smoke Test Configuration
# =========================
# Minimal config for quick sanity check.
# Supports: momentum, mean_reversion, ses_pairs_trading strategies.

experiment_name: "Smoke_Test"
experiment_type: "smoke_test"

# Symbols - adjust based on strategy type:
# - Single-symbol: ["TSLA"]
# - Pairs trading: ["AAPL", "MSFT", "GOOGL", "AMZN"]  # Need 2+ symbols
symbols: ["BTC","ETH"]
interval: "1min"
start_date: "2024-12-18"  # Valid data date
end_date: "2024-12-18"    # Same day (1 day test)

# Small capital for quick test
initial_capital: 100000
allow_shorts: true  # Pairs trading requires shorting

# ========================================
# STRATEGY SELECTION
# Uncomment ONE strategy block to test
# ========================================

