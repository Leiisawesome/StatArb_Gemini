# Base Configuration Template
# ===========================
# Default settings for all backtest experiments.
# ONLY contains valid BacktestConfig parameters.

# Experiment metadata
experiment_name: "Base_Backtest"
experiment_type: "baseline"

# Market data
symbols: ["AAPL"]
interval: "1min"
start_date: "2023-01-01"
end_date: "2024-12-31"

# ClickHouse settings
clickhouse_host: "localhost"
clickhouse_port: 8123
clickhouse_database: "polygon_data"

# Portfolio settings
initial_capital: 5000000
allow_shorts: true
max_position_size: 0.10        # 10% per position
max_concentration: 0.20        # 20% max (must be > max_position_size)
max_total_exposure: 1.0
max_daily_var: 0.05
max_drawdown: 0.20

# Risk management
min_signal_confidence: 0.60
enable_regime_adjustments: true
regime_risk_multipliers:
  low_volatility: 1.2
  normal_volatility: 1.0
  high_volatility: 0.7
  extreme_volatility: 0.4

# Risk authorization thresholds
auto_approval_threshold: 0.08
elevated_review_threshold: 0.15
emergency_threshold: 0.25

# Transaction costs
commission_per_trade: 0.005
max_spread_bps: 25.0

# Market impact model
impact_model: "almgren_chriss"
linear_coefficient: 0.1
sqrt_coefficient: 0.5
base_slippage_bps: 2.0
volatility_slippage_multiplier: 1.5
default_fill_rate: 0.99
partial_fills_enabled: false

# Execution settings
enable_realistic_fills: true
enable_liquidity_filtering: true
enable_cost_modeling: true
min_liquidity_score: 60.0

# Logging
log_level: "INFO"
