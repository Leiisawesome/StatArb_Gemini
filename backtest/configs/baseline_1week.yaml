# Baseline Backtest Configuration - Short Test
# =============================================
# 1-week test to verify signal generation.

experiment_name: "Baseline_AAPL_1Week"
experiment_type: "baseline_backtest"

# Symbol and period (1 week)
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-02"  # Tuesday
end_date: "2024-01-05"    # Friday (1 week)

# Portfolio settings
initial_capital: 1000000
allow_shorts: false
max_position_size: 0.10
max_concentration: 0.15

# Mean Reversion Strategy
strategy:
  type: "mean_reversion"
  name: "MR_1Week"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    zscore_entry_threshold: 1.5      # RELAXED for testing
    zscore_exit_threshold: 0.5
    rsi_oversold: 40                  # RELAXED for testing
    rsi_overbought: 60                # RELAXED for testing
    scan_all_bars: true               # CRITICAL
    scan_interval: 1
    enable_regime_filter: false       # Disable for baseline

# Risk management  
min_signal_confidence: 0.50           # RELAXED for testing
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7

# Transaction costs
base_spread_bps: 0.5
commission_per_share: 0.0005

# Logging
log_level: "INFO"
save_trade_log: true

