# Walk-Forward Analysis Configuration
# ====================================
# Out-of-sample testing with rolling train/test windows

experiment_name: "Walk_Forward_Quick_Test"
experiment_type: "walk_forward_analysis"

# Overall test period
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-02"  # Start early enough for multiple windows
end_date: "2024-01-05"    # 4 days total (Tue-Fri)

# Walk-Forward Configuration
walk_forward:
  train_days: 1           # 1 day training window
  test_days: 1            # 1 day testing window
  num_windows: 2          # 2 windows (quick test)

# Portfolio settings
initial_capital: 1000000
allow_shorts: false
max_position_size: 0.10
max_concentration: 0.20

# Base strategy (parameters will be optimized in each training window)
strategy:
  type: "mean_reversion"
  name: "MR_WalkForward"
  allocation_pct: 1.0
  parameters:
    lookback: 20
    bollinger_period: 20
    bollinger_std: 2.0
    stop_loss_atr_multiple: 2.0
    max_holding_period: 10
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    
    # Default values (will be optimized)
    zscore_entry_threshold: 1.5
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    base_position_pct: 0.02

# PARAMETER GRID (for optimization in training windows)
# Small grid for quick test: 2 x 2 = 4 combinations per window
parameter_grid:
  zscore_entry_threshold: [1.5, 2.0]
  base_position_pct: [0.02, 0.03]

# Risk management
min_signal_confidence: 0.50
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7

# Transaction costs
commission_per_trade: 0.005
max_spread_bps: 25.0

