# Final Baseline Test - Proper Thresholds
# =========================================
# Realistic mean reversion parameters for validation

experiment_name: "Final_Baseline_AAPL_Jan3"
experiment_type: "baseline_backtest"

# Single day with good data
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"  # 800 bars, 2.08% intraday move
end_date: "2024-01-03"

# Standard portfolio settings
initial_capital: 1000000
allow_shorts: false
max_position_size: 0.10    # 10% max per position
max_concentration: 0.15     # 15% max concentration

# Mean Reversion with STANDARD parameters
strategy:
  type: "mean_reversion"
  name: "MR_Standard"
  allocation_pct: 1.0
  parameters:
    # Standard mean reversion parameters
    lookback: 20
    zscore_entry_threshold: 2.0      # Standard 2 std devs
    zscore_exit_threshold: 0.5       # Exit at 0.5 std devs
    
    # Standard RSI thresholds
    rsi_oversold: 30                  # Standard oversold
    rsi_overbought: 70                # Standard overbought
    
    # Bollinger Bands
    bollinger_period: 20
    bollinger_std: 2.0
    
    # Position sizing (KEY PARAMETER)
    base_position_pct: 0.02           # 2% per trade ($20K position)
    max_position_pct: 0.05            # 5% max
    
    # Risk management
    stop_loss_atr_multiple: 2.0
    max_holding_period: 10
    
    # Scanning (CRITICAL for backtesting)
    scan_all_bars: true
    scan_interval: 1
    
    # Regime filtering
    enable_regime_filter: false       # Disable for baseline

# Standard risk management
min_signal_confidence: 0.60           # 60% minimum confidence
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7
  extreme_volatility: 0.4

# Realistic transaction costs
base_spread_bps: 0.5                  # 0.5 bps spread
commission_per_share: 0.0005          # $0.0005 per share

# Logging
log_level: "INFO"
save_trade_log: true
save_regime_log: false

