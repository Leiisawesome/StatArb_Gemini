# Smoke Test Configuration
# =========================
# Minimal config for quick sanity check.
# Supports: momentum, mean_reversion, ses_pairs_trading strategies.

experiment_name: "Smoke_Test"
experiment_type: "smoke_test"

# Symbols - adjust based on strategy type:
# - Single-symbol: ["TSLA"]
# - Pairs trading: ["AAPL", "MSFT", "GOOGL", "AMZN"]  # Need 2+ symbols
symbols: ["TSLA"]  # Single-symbol for momentum/mean reversion
interval: "1min"
start_date: "2024-12-20"  # Valid data date
end_date: "2024-12-20"    # Same day (1 day test)

# Warmup parity with Papertest (RTH bars). If omitted, Backtest infers a default.
warmup_bars: 200

# Small capital for quick test
initial_capital: 100000
allow_shorts: false  # Disable for mean reversion (enable for pairs trading)

# ========================================
# STRATEGY SELECTION
# Uncomment ONE strategy block to test
# ========================================

# Mean Reversion Strategy (ACTIVE)
# NOTE: Strategy uses EXHAUSTION SCORING system (v3.0)
# Key thresholds are dislocation_*, NOT zscore_entry_threshold!
strategies:
  - type: "mean_reversion"
    name: "MR_Simple"
    allocation_pct: 1.0
    parameters:
      # Core parameters
      lookback_period: 30               # Smoother z-score (was 20)
      scan_all_bars: false
      scan_interval: 1
      enable_regime_filter: false
      
      # EXHAUSTION SCORING THRESHOLDS (ACTUAL entry control)
      # Higher thresholds = fewer but higher-quality trades (larger price moves)
      dislocation_minimum: 2.5          # Min z-score to consider (raised from 2.0 for more alpha)
      dislocation_moderate: 2.5         # For moderate signal scoring
      dislocation_strong: 3.0           # For strong signal scoring
      
      # Score thresholds for signal generation
      exhaustion_score_moderate: 55.0   # Min score to generate signal (default 60)
      exhaustion_score_strong: 65.0     # Score for high confidence (default 70)
      
      # RSI settings
      rsi_oversold: 35
      rsi_overbought: 65
      
      # Position sizing
      base_position_pct: 0.1    # 10% of portfolio per trade
      
      # PRICE-AWARE EXIT THRESHOLDS
      stop_loss_pct: -2.0
      take_profit_pct: 10.0
      min_profit_to_exit: 0.0    # Require at least breakeven (no loss exits)
      
      # MOMENTUM-AWARE EXIT LOGIC (NEW)
      enable_momentum_exit: true
      momentum_adx_threshold: 20.0      # ADX < 20 = weak trend, OK to exit
      momentum_rsi_overbought: 70.0     # RSI > 70 = momentum exhausted, OK to exit
      momentum_rsi_oversold: 30.0       # RSI < 30 = momentum exhausted, OK to exit
      momentum_volume_ratio: 0.7        # Volume < 70% avg = fading, OK to exit
      momentum_extended_zscore: 3.0     # Always exit if |z| > 3.0
      volume_climax_threshold: 1.8      # Volume > 1.8x avg = climax, OK to enter/exit
#
      # Legacy (kept for reference but NOT used by exhaustion system)
      zscore_entry_threshold: 1.5       # IGNORED - use dislocation_minimum instead
      zscore_exit_threshold: 0.5
      
      # INTRADAY TRADING - EOD LIQUIDATION
      enable_eod_liquidation: true      # Close all positions before market close
      eod_close_time: "15:55"           # Time to liquidate (5 min before close)
      enable_entry_cutoff: true         # Stop new entries near close
      entry_cutoff_time: "15:30"        # No new entries after this time
      min_holding_bars: 5               # Minimum bars to hold (avoid churn)

# Minimal risk management
min_signal_confidence: 0.40  # Parity with papertest
max_position_size: 0.10      # Parity with papertest (cap exposure to ~10%)


