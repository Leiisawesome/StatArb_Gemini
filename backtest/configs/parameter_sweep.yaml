# Parameter Sweep Configuration
# ==============================
# Grid search over strategy parameters

experiment_name: "Parameter_Sweep_MeanReversion"
experiment_type: "parameter_sweep"

# Market data (use short period for fast testing)
symbols: ["AAPL"]
interval: "1min"
start_date: "2024-01-03"  # Good data day
end_date: "2024-01-03"    # Single day for speed

# Portfolio settings
initial_capital: 1000000
allow_shorts: false
max_position_size: 0.10
max_concentration: 0.15

# Base strategy (parameters will be swept)
strategy:
  type: "mean_reversion"
  name: "MR_Sweep"
  allocation_pct: 1.0
  parameters:
    # Fixed parameters
    lookback: 20
    bollinger_period: 20
    bollinger_std: 2.0
    stop_loss_atr_multiple: 2.0
    max_holding_period: 10
    scan_all_bars: true
    scan_interval: 1
    enable_regime_filter: false
    
    # Default values (will be overridden by sweep)
    zscore_entry_threshold: 2.0
    zscore_exit_threshold: 0.5
    rsi_oversold: 40
    rsi_overbought: 60
    base_position_pct: 0.02

# PARAMETER GRID (combinations to test)
# ======================================
# Total combinations = 3 x 3 x 3 x 3 x 3 = 243
# Expected runtime: ~8-15 minutes (20-40s per combination)
parameter_grid:
  # Z-score thresholds (mean reversion signals)
  zscore_entry_threshold: [1.5, 2.0, 2.5]
  zscore_exit_threshold: [0.3, 0.5, 0.7]
  
  # RSI thresholds (confirmation)
  rsi_oversold: [30, 40, 50]
  rsi_overbought: [50, 60, 70]
  
  # Position sizing
  base_position_pct: [0.01, 0.02, 0.03]  # 1%, 2%, 3%

# Risk management
min_signal_confidence: 0.50
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7

# Transaction costs (using valid BacktestConfig parameters)
commission_per_trade: 0.005
max_spread_bps: 25.0

# Logging
log_level: "WARNING"  # Reduce verbosity for sweep
save_trade_log: false  # Speed up sweep

