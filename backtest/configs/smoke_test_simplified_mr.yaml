# Simplified Mean Reversion v5.0 Smoke Test Configuration
# =========================================================
# Tests the expert-reviewed simplified strategy with 4 orthogonal features

# Experiment metadata (flat keys)
experiment_name: "Simplified_MR_v5_Smoke_Test"
experiment_type: "smoke_test"

# Market data (flat keys)
symbols: ["TSLA","NVDA"]
start_date: "2024-12-20"
end_date: "2024-12-20"
interval: "1min"

# Portfolio settings
initial_capital: 100000
max_position_size: 0.40
max_concentration: 0.40
allow_shorts: false

# Transaction costs
commission_per_trade: 0.005
base_slippage_bps: 2.0

# Signal filtering - lower threshold for v5.0 unified scores
min_confidence_threshold: 0.5
min_signal_confidence: 0.5

# Strategy configuration - must be in strategies array
strategies:
  - type: "mean_reversion"
    name: "MR_Simplified_v5"
    allocation_pct: 1.0
    parameters:
      # Enable v5.0 simplified strategy
      use_simplified_strategy: true
      
      # Core parameters
      lookback_period: 20
      dislocation_minimum: 2.0  # Was 1.0 - require STRONGER dislocation to trade
      # CRITICAL: Set to false for backtest - engine calls generate_signals per bar
      # When true, strategy scans ALL bars at once which breaks aggregation
      scan_all_bars: false
      scan_interval: 1
      
      # v5.0 Unified threshold (replaces SMS + ERAR + 5-factor)
      unified_threshold: 0.5
      
      # Structure confirmation (higher low / lower high)
      enable_structure_confirmation: false
      
      # Thesis invalidation exits (replaces PnL-based stops)
      # IMPORTANT: Higher thresholds = more patience = let mean reversion play out
      max_hold_bars: 60           # Was 20 - hold longer to let reversion happen
      trend_acceleration_threshold: 5.0  # Was 1.5 - only exit on MAJOR trend surge
      regime_shift_threshold: 3.0  # Was 2.0 - less sensitive to vol changes
      
      # Edge ratio (disabled - insufficient history in smoke test)
      enable_edge_ratio_check: false
      
      # Regime filter
      enable_regime_filter: false
      min_trend_strength: 0.3
      
      # Position sizing
      base_position_pct: 0.1    # 10% of portfolio per trade (matches smoke_test.yaml)
      
      # Disable legacy ADS gates
      enable_ads_gates: false
