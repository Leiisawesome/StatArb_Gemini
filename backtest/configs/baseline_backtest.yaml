# Baseline Backtest Configuration
# ================================
# Extended period backtest for baseline performance metrics.

experiment_name: "Baseline_TSLA_Jan2024"
experiment_type: "baseline_backtest"

# Symbol and period
symbols: ["TSLA"]
interval: "1min"
start_date: "2024-01-02"  # First trading day of 2024
end_date: "2024-01-31"    # Full month (Jan 2024)

# Portfolio settings
initial_capital: 1000000  # $1M baseline
allow_shorts: false
max_position_size: 0.10   # 10% per position
max_concentration: 0.15   # 15% max single symbol

# Mean Reversion Strategy (with signal debugging)
strategy:
  type: "mean_reversion"
  name: "MR_Baseline"
  allocation_pct: 1.0
  parameters:
    # Core parameters
    lookback: 20
    zscore_entry_threshold: 2.0
    zscore_exit_threshold: 0.5
    
    # RSI thresholds
    rsi_oversold: 30
    rsi_overbought: 70
    
    # Bollinger Bands
    bollinger_period: 20
    bollinger_std: 2.0
    
    # Position sizing
    base_position_pct: 0.02   # 2% base size
    max_position_pct: 0.05    # 5% max size
    
    # Risk management
    stop_loss_atr_multiple: 2.0
    max_holding_period: 10
    
    # Scanning mode (CRITICAL for backtesting)
    scan_all_bars: true        # Enable historical scanning
    scan_interval: 1           # Check every bar
    
    # Regime filtering
    enable_regime_filter: false  # Disable for baseline
    
    # Signal confidence
    enable_regime_adjusted_thresholds: false

# Risk management
min_signal_confidence: 0.60
regime_risk_multipliers:
  low_volatility: 1.0
  normal_volatility: 1.0
  high_volatility: 0.7
  extreme_volatility: 0.4

# Transaction costs
base_spread_bps: 0.5
commission_per_share: 0.0005

# Execution settings
default_execution_strategy: "adaptive"

# Liquidity filters
min_daily_volume: 100000
min_liquidity_score: 0.50

# Logging
log_level: "INFO"
save_trade_log: true
save_regime_log: true

