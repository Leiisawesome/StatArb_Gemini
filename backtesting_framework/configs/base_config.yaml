# Base Configuration for StatArb Framework
# This file contains default configuration settings for the backtesting framework

# Database Configuration
database:
  type: "clickhouse"
  host: "localhost"
  port: 9000
  database: "polygon_data"
  username: "default"
  password: ""
  timeout: 30

# Data Configuration
data:
  source: "polygon"
  symbols: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
  start_date: "2023-01-01"
  end_date: "2025-01-31"
  frequency: "daily"
  fields: ["open", "high", "low", "close", "volume"]

# Strategy Configuration
strategy:
  name: "momentum"
  parameters:
    lookback_period: 252
    momentum_threshold: 0.10
    max_weight_per_asset: 0.08
    rebalancing_frequency: "daily"
    commission_rate: 0.0005

# Risk Management
risk:
  max_drawdown: 0.20
  target_volatility: 0.15
  position_sizing: "risk_parity"
  stop_loss: 0.05

# Performance Configuration
performance:
  benchmark: "SPY"
  risk_free_rate: 0.02 
  metrics: ["sharpe_ratio", "max_drawdown", "calmar_ratio", "sortino_ratio"]

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "backtest.log"
  console: true 