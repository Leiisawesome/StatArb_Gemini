# Pairs Trading Strategy Configuration

# Experiment identification
name: "AAPL-MSFT Pairs Trading"
description: "Statistical arbitrage between AAPL and MSFT using z-score based signals"
version: "1.0.0"

# Data configuration
symbols: ["AAPL", "MSFT"]
start_date: "2023-01-01"
end_date: "2023-12-31"

# Strategy configuration
strategy_class: "PairsTradingStrategy"
strategy_params:
  z_entry_threshold: 2.0
  z_exit_threshold: 0.5
  lookback_window: 60
  correlation_threshold: 0.8
  cointegration_pvalue: 0.05
  position_size: 0.2
  max_positions: 5
  stop_loss: 0.05
  take_profit: 0.02
  max_drawdown: 0.15

# Execution configuration
initial_capital: 100000.0
commission_rate: 0.001
slippage_rate: 0.0005

# Risk management
max_position_size: 0.2
stop_loss: 0.05
take_profit: 0.02

# Output configuration
output_dir: "results/pairs_trading"
save_trades: true
save_signals: true
generate_plots: true

# Performance tracking
benchmark_symbol: "SPY"
risk_free_rate: 0.02 