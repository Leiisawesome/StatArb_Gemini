# Technical Momentum Strategy Configuration
name: "technical_momentum"
version: "1.0.0"

# Strategy Parameters
parameters:
  # Technical indicator parameters
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2
  
  # Signal thresholds
  rsi_oversold: 30
  rsi_overbought: 70
  macd_threshold: 0.001
  bollinger_threshold: 0.02
  
  # Position sizing
  position_size: 0.1
  max_positions: 15

# Risk Limits
risk_limits:
  max_position_value: 3000000
  max_daily_loss: 0.015
  max_drawdown: 0.12

# Timeframes
timeframes:
  - "5min"
  - "15min"
  - "1hour"

# Trading symbols
symbols:
  - "AAPL"
  - "MSFT"
  - "GOOGL"
  - "AMZN"
  - "TSLA" 