# Technical Momentum Strategy Configuration (TUNED for More Trades)
name: "technical_momentum_tuned"
version: "2.1.0"
strategy_class: "MultiFactorEnsembleStrategy"

# Academic Research Foundation
academic_basis:
  technical_analysis_foundation: true
  momentum_theory: true
  mean_reversion_theory: true
  volatility_theory: true

# Multi-Factor Configuration (TUNED - More Aggressive)
factors:
  - factor_type: "technical"
    lookback_period: 14  # Reduced from 20
    threshold: 0.05      # Reduced from 0.15
    weight: 0.4
    indicators:
      rsi_period: 10     # Reduced from 14
      macd_fast: 8       # Reduced from 12
      macd_slow: 21      # Reduced from 26
      macd_signal: 7     # Reduced from 9
      bollinger_period: 15  # Reduced from 20
      bollinger_std: 1.5    # Reduced from 2
      rsi_oversold: 35      # Increased from 30
      rsi_overbought: 65    # Decreased from 70
      macd_threshold: 0.0005  # Reduced from 0.001
      bollinger_threshold: 0.01  # Reduced from 0.02
  
  - factor_type: "momentum"
    lookback_period: 60   # Reduced from 252
    threshold: 0.03       # Reduced from 0.10
    weight: 0.3
    momentum_type: "risk_adjusted"
  
  - factor_type: "mean_reversion"
    lookback_period: 30   # Reduced from 60
    threshold: 0.08       # Reduced from 0.20
    weight: 0.2
    mean_reversion_threshold: 0.3  # Reduced from 0.5
  
  - factor_type: "volatility"
    lookback_period: 20   # Reduced from 30
    threshold: 0.10       # Reduced from 0.25
    weight: 0.1
    volatility_metrics: ["rolling_std", "bollinger_width"]

# Ensemble Configuration (TUNED)
ensemble_method: "adaptive_weighting"
factor_combination_method: "weighted_sum"
signal_threshold: 0.03    # Reduced from 0.15
max_factors_per_asset: 4

# Portfolio Configuration
portfolio:
  initial_capital: 100000
  base_currency: "USD"
  max_capital_utilization: 0.95
  cash_buffer: 0.05

# Risk Management (TUNED - More Aggressive)
risk_limits:
  max_position_value: 15000  # Increased from 10000
  max_daily_loss: 0.02       # Increased from 0.015
  max_drawdown: 0.15         # Increased from 0.12
  max_position_size: 0.15    # Increased from 0.1
  max_positions: 20          # Increased from 15
  max_sector_exposure: 0.35  # Increased from 0.30
  max_single_stock_weight: 0.08  # Increased from 0.05

# Trading Configuration (TUNED)
trading:
  rebalancing_frequency: "intraday"
  rebalancing_interval: "5min"   # Reduced from 15min
  commission_rate: 0.0005
  slippage: 0.0001
  min_trade_size: 50              # Decreased from 100 to 50
  max_trades_per_day: 30          # Reduced from 100 to 30
  enable_stop_loss: true
  enable_take_profit: true

# Performance Targets (TUNED)
performance:
  target_return: 0.20            # Increased from 0.15
  max_drawdown: 0.15             # Increased from 0.12
  sharpe_ratio_target: 1.2       # Reduced from 1.5
  information_ratio_target: 0.6  # Reduced from 0.8

# Data Requirements (TUNED)
data:
  required_fields: ["open", "high", "low", "close", "volume"]
  min_data_points: 60            # Reduced from 252
  data_quality_threshold: 0.90   # Reduced from 0.95
  timeframes: ["5min", "15min", "1hour", "1day"]
  processing_frequency: "5min"   # Reduced from 15min
  real_time_updates: true

# Trading Symbols (Same curated list)
symbols:
  - "AAPL"
  - "MSFT"
  - "GOOGL"
  - "AMZN"
  - "NVDA"
  - "META"
  - "TSLA"
  - "ADBE"
  - "AMD"
  - "CRM"
  - "NFLX"
  - "PYPL"
  - "JNJ"
  - "PFE"
  - "UNH"
  - "ABBV"
  - "TMO"
  - "DHR"
  - "BMY"
  - "GILD"
  - "SPY" 