# Canonical Smoke Test Suite: Momentum (MOM) - SMS Gate Path
# =========================================================
# Purpose:
# - Specifically exercise ADS v3.1 gating in EnhancedMomentumStrategy:
#     Data -> Composite entry -> SMS gate (pending/mature) -> ERAR gate -> Intent
# - This suite disables the state machine so the ADS gating branch is executed.
#
# NOTE:
# - Uses papertest schema as canonical SSOT, then gets adapted to backtest schema by
#   backtest/utils/config_loader._papertest_to_backtest_config().
#

papertest:
  data:
    symbols: ["TSLA"]
    start_date: "2024-12-18"
    end_date: "2024-12-20"
    interval: "1min"
    replay_speed: "FAST_1000X"
    simulate_market_hours: false

  buffers:
    size: 400
    warmup_required: 200

  session:
    stall_threshold_seconds: 300.0

  # Smoke-test-only: allow lower-confidence entries through the multi-strategy aggregator.
  min_confidence_threshold: 0.40

  regime:
    enable_per_bar_fast: true

  strategies:
    - type: "momentum"
      name: "MOM_SMS_Gate"
      allocation_pct: 1.0
      parameters:
        # Critical: disable state machine so ADS composite/SMS gating path is used.
        enable_state_machine: false
        # Engine runs bar-by-bar; avoid O(n^2) historical rescans in smoke tests.
        scan_all_bars: false
        scan_interval: 1

        # EOD liquidation and risk-side exits (Rule 7): keep lifecycle complete even for entry-intent strategies.
        enable_eod_liquidation: true
        eod_close_time: "15:55"
        enable_ads_multi_exit: true
        max_holding_minutes: 30
        enable_forward_vol_stops: true

        # Momentum feature horizons
        short_period: 10
        medium_period: 20
        long_period: 50
        lookback_period: 60

        # Composite entry loosening to ensure ADS gate branch is exercised in a short sample.
        # (If composite_z/pct are missing in the enrichment pipeline, strategy has a fallback compute.)
        # Very permissive thresholds: this suite is about exercising the ADS/SMS gate path,
        # not validating entry selectivity.
        composite_z_entry: 0.0
        composite_pct_entry: 50.0

        # Momentum thresholds (moderately permissive)
        momentum_threshold: 0.02
        adx_threshold: 25.0
        volume_threshold: 1.2

        # ADS gating knobs (explicit)
        # Keep ERAR disabled for this suite so we isolate/validate SMS wiring (gate + pending/mature).
        enable_ads_gates: false
        # Make SMS gate permissive so at least some signals pass immediately; this suite is
        # validating wiring/branch coverage, not profitability.
        tau_0: 0.35
        sms_max_pending: 50
        sms_decay_rate: 0.05
        erar_gamma: 0.10


        # Position sizing (intent hint only; CentralRiskManager retains authority)
        base_position_pct: 0.10
        max_position_pct: 0.10

  risk:
    # Allow shorts so this suite can exercise both LONG_ENTRY and SHORT_ENTRY paths
    # through the ADS/SMS gating branch.
    allow_shorts: true
    min_signal_confidence: 0.40
    max_position_size: 0.40
    max_position_pct: 0.10
    max_positions: 1
    position_concentration_limit: 1.0
    daily_risk_budget_pct: 0.01
    per_trade_risk_pct: 0.005

  execution:
    test_mode: true
    initial_cash: 100000.0
    commission_per_share: 0.005
    min_commission: 1.0
    latency_ms_min: 0.0
    latency_ms_max: 0.0
    fill_probability: 1.0
    partial_fill_probability: 0.0
    slippage_bps_max: 2.0
    impact_coefficient: 10.0
    seed: 42
    use_historical_execution_simulator: true

