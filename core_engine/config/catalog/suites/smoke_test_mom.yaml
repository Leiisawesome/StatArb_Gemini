# Canonical Smoke Test Suite: Momentum (MOM) - SMS + ERAR Gate Path
# ================================================================
# Purpose:
# - Exercise ADS v3.1 gating in EnhancedMomentumStrategy with BOTH:
#     - SMS gate (pending/mature)
#     - ERAR gate (expected risk-adjusted return)
#
# This complements `smoke_test_mom_sms.yaml` (SMS-only isolation suite).
#

papertest:
  data:
    symbols: ["TSLA"]
    start_date: "2024-12-18"
    end_date: "2024-12-20"
    interval: "1min"
    replay_speed: "FAST_1000X"
    simulate_market_hours: false

  buffers:
    size: 400
    warmup_required: 200

  session:
    stall_threshold_seconds: 300.0

  # Smoke-test-only: allow lower-confidence entries through the multi-strategy aggregator.
  min_confidence_threshold: 0.40

  regime:
    enable_per_bar_fast: true

  strategies:
    - type: "momentum"
      name: "MOM_SMS_ERAR_Gate"
      allocation_pct: 1.0
      parameters:
        # Disable state machine so ADS composite/SMS gating path is used.
        enable_state_machine: false
        scan_all_bars: false
        scan_interval: 1

        # EOD liquidation + risk-side exits (Rule 7)
        enable_eod_liquidation: true
        eod_close_time: "15:55"
        enable_ads_multi_exit: true
        max_holding_minutes: 30
        enable_forward_vol_stops: true

        # Momentum feature horizons
        short_period: 10
        medium_period: 20
        long_period: 50
        lookback_period: 60

        # Permissive composite thresholds: focus is gate wiring/coverage, not selectivity.
        composite_z_entry: 0.0
        composite_pct_entry: 50.0

        # Momentum thresholds
        momentum_threshold: 0.02
        adx_threshold: 25.0
        volume_threshold: 1.2

        # ADS gating knobs (explicit)
        enable_ads_gates: true
        tau_0: 0.40
        sms_max_pending: 50
        sms_decay_rate: 0.05
        sms_mode: "multiplicative"
        sms_min_info_to_mature: 0.5
        sms_max_info: 12.0
        sms_prior_p0: 0.55
        sms_prior_strength_coef: 0.10
        sms_delay_penalty_per_bar: 0.02
        sms_w_setup_maturity: 1.10
        sms_w_setup_validity: 1.25
        sms_w_flow_support: 0.80
        sms_w_vol_compression: 0.60
        sms_info_w_volume: 0.55
        sms_info_w_volatility: 0.45
        sms_info_cap: 3.0

        # Phase 1: trend persistence filter
        enable_trend_persistence_filter: true
        trend_persistence_lookback: 10
        trend_persistence_min_ratio: 0.6

        # Regime Adaptive Sizing (ADS v3.1 Logic)
        enable_regime_adaptive_sizing: true

        # ERAR: permissive gamma so we still trade in a short smoke window.
        erar_gamma: 0.10
        erar_tail_lambda: 1.0

        # Position sizing (intent hint only; CentralRiskManager retains authority)
        base_position_pct: 0.10
        max_position_pct: 0.10

  risk:
    allow_shorts: true
    min_signal_confidence: 0.40
    max_position_size: 0.40
    max_position_pct: 0.10
    max_positions: 1
    position_concentration_limit: 1.0
    daily_risk_budget_pct: 0.01
    per_trade_risk_pct: 0.005

  execution:
    test_mode: true
    initial_cash: 100000.0
    commission_per_share: 0.005
    min_commission: 1.0
    latency_ms_min: 0.0
    latency_ms_max: 0.0
    fill_probability: 1.0
    partial_fill_probability: 0.0
    slippage_bps_max: 5.0
    impact_coefficient: 10.0
    seed: 42
    use_historical_execution_simulator: true

