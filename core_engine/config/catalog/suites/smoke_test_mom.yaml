# Canonical Smoke Test Suite: Momentum (MOM) - SMS + ERAR Gate Path
# ================================================================
# Purpose:
# - Exercise ADS v3.1 gating in EnhancedMomentumStrategy with BOTH:
#     - SMS gate (pending/mature)
#     - ERAR gate (expected risk-adjusted return)
#
# This complements `smoke_test_mom_sms.yaml` (SMS-only isolation suite).
#

papertest:
  data:
    symbols: ["TSLA"]
    start_date: "2024-12-16"
    end_date: "2024-12-20"
    interval: "1min"
    replay_speed: "FAST_1000X"
    simulate_market_hours: false

  buffers:
    size: 400
    warmup_required: 200

  session:
    stall_threshold_seconds: 300.0
    intraday_session_isolation: true

  # Smoke-test-only: allow lower-confidence entries through the multi-strategy aggregator.
  min_confidence_threshold: 0.40

  regime:
    enable_per_bar_fast: true

  strategies:
    - type: "momentum"
      name: "MOM_SMS_ERAR_Gate"
      allocation_pct: 2.0
      parameters:
        # Disable state machine so ADS composite/SMS gating path is used.
        enable_state_machine: false
        scan_all_bars: false
        scan_interval: 1

        # Opening Range Filter: skip first N minutes after 09:30 open.
        # The ORB period is dominated by overnight order imbalance
        # clearing — momentum indicators are unreliable during this window.
        orb_minutes: 15

        # EOD liquidation + risk-side exits (Rule 7)
        enable_eod_liquidation: true
        eod_close_time: "15:55"
        enable_ads_multi_exit: true
        max_holding_minutes: 30
        enable_forward_vol_stops: true

        # Momentum feature horizons
        short_period: 10
        medium_period: 20
        long_period: 50
        lookback_period: 60

        # Structural entry thresholds: composite z-score and percentile must
        # represent a meaningful departure from recent history to qualify as
        # a momentum setup.  These values work with the threshold floor
        # (composite_z_floor=0.5, composite_pct_floor=60.0) to ensure real
        # selectivity even if accidentally set too low.
        composite_z_entry: 0.8
        composite_pct_entry: 65.0

        # Structural confirmation: without price structure, volume expansion,
        # or volatility breakout, require z-score 2x higher to enter.
        unconfirmed_z_multiplier: 2.0

        # Multi-horizon alignment: minimum momentum magnitude for alignment
        momentum_noise_floor: 0.001

        # Volume confirmation threshold (volume_ratio above this)
        volume_confirm_threshold: 0.3

        # Volatility breakout threshold (short_vol / long_vol above this)
        vol_expansion_threshold: 1.3

        # Momentum thresholds
        momentum_threshold: 0.02
        adx_threshold: 25.0
        volume_threshold: 1.2

        # ADS gating knobs (explicit)
        enable_ads_gates: true
        tau_0: 0.40
        sms_max_pending: 50
        sms_decay_rate: 0.05
        sms_mode: "multiplicative"
        sms_min_info_to_mature: 0.5
        sms_max_info: 12.0
        sms_prior_p0: 0.55
        sms_prior_strength_coef: 0.10
        sms_delay_penalty_per_bar: 0.02
        sms_w_setup_maturity: 1.10
        sms_w_setup_validity: 1.25
        sms_w_flow_support: 0.80
        sms_w_vol_compression: 0.60
        sms_info_w_volume: 0.55
        sms_info_w_volatility: 0.45
        sms_info_cap: 3.0

        # Phase 1: trend persistence filter
        enable_trend_persistence_filter: true
        trend_persistence_lookback: 10
        trend_persistence_min_ratio: 0.6

        # VPIN / Flow Toxicity Gate (v3.2)
        # Easley-Lopez de Prado-O'Hara (2012) integration:
        #   1. Hard block entries when VPIN pct > threshold
        #   2. Dynamic adverse_prob in ERAR cost model
        #   3. SMS tau(R) hardening under toxic flow
        enable_vpin_gate: true
        vpin_block_threshold: 0.85
        erar_base_adverse_prob: 0.10
        vpin_adverse_sensitivity: 0.40
        vpin_tau_sensitivity: 0.15

        # Transition Supervisor calibration for 1-min bars (v3.3)
        # With real feature data now flowing (directional_coherence,
        # transition_score, vol_of_vol), the transition supervisor actually
        # functions.  The multiplicative transition_score is naturally
        # near-zero at 1-min resolution — recalibrate to avoid false blocks.
        # MQS (v3.3) subsumes the quality scoring role of transition_score.
        transition_threshold: 0.0
        transition_threshold_strict: 0.001
        vov_block_threshold: 0.98

        # Microstructure Quality Score (MQS v3.3)
        # Multiplicative quality score penalises confidence rather
        # than hard-blocking -- avoids over-kill from feature overlap.
        # Only extreme BVC contra-flow gets a hard block.
        enable_microstructure_quality: true
        bvc_hard_block: 0.15
        mqs_coherence_ref: 0.15
        mqs_bvc_ref: 0.45
        mqs_vol_floor: -0.50
        mqs_vol_range: 0.50
        mqs_penalty_weight: 0.25

        # Regime Adaptive Sizing (ADS v3.1 Logic)
        enable_regime_adaptive_sizing: true

        # ERAR: permissive gamma so we still trade in a short smoke window.
        erar_gamma: 0.10
        erar_tail_lambda: 1.0

        # Position sizing (intent hint only; CentralRiskManager retains authority)
        base_position_pct: 0.20
        max_position_pct: 0.20

        # Causal-chain entry prioritization (L1→L2→L3)
        enable_causal_entry_chain: true
        min_alignment_score: 0.55
        min_trigger_score: 0.55
        min_confirmation_score: 0.55
        entry_score_threshold: 0.62
        trigger_slope_ref: 0.0025
        trigger_inflection_bonus: 0.10

        # Strategy expected return estimate (for Gate-6 blended edge)
        expected_return_base_bps: 12.0
        expected_return_max_bps: 80.0
        expected_return_alignment_weight: 0.20
        expected_return_trigger_weight: 0.45
        expected_return_confirmation_weight: 0.35

  risk:
    allow_shorts: true
    min_signal_confidence: 0.40
    max_position_size: 0.40
    max_position_pct: 0.20
    max_positions: 1
    position_concentration_limit: 1.0
    daily_risk_budget_pct: 0.01
    per_trade_risk_pct: 0.005

  execution:
    test_mode: true
    initial_cash: 100000.0
    commission_per_share: 0.005
    min_commission: 1.0
    latency_ms_min: 0.0
    latency_ms_max: 0.0
    fill_probability: 1.0
    partial_fill_probability: 0.0
    slippage_bps_max: 5.0
    impact_coefficient: 10.0
    seed: 42
    use_historical_execution_simulator: true

  # End-to-end pipeline tracing (Signal-to-PnL trace framework)
  trace:
    enable_pipeline_trace: true

