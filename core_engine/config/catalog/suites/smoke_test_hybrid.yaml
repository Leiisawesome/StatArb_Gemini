# Canonical Smoke Test Suite: Hybrid (MOM + MR)
# =============================================
# Purpose:
# - Exercise multi-strategy coordination (MOM + MR) under a single suite.
# - Validate StrategyManager aggregation + CentralRiskManager authorization.
# - Keep short window and deterministic fills for parity iteration.
#
# Schema: papertest (single source of truth)

papertest:
  data:
    symbols: ["TSLA"]
    start_date: "2024-12-18"
    end_date: "2024-12-20"
    interval: "1min"
    replay_speed: "FAST_1000X"
    simulate_market_hours: false

  buffers:
    size: 400
    warmup_required: 200

  session:
    stall_threshold_seconds: 300.0

  # Allow lower-confidence entries so both strategies can exercise signals.
  min_confidence_threshold: 0.40

  # Regime engine (single-symbol, per-bar): enable fast incremental evaluator.
  regime:
    enable_per_bar_fast: true

  # Hybrid: pass-through signals (no aggregation) so MOM + MR results add together.
  strategy_manager:
    enable_signal_aggregation: false
    enable_conflict_resolution: false
    enable_dynamic_weighting: false
    isolate_strategy_backtests: true
    # Optional: if set, run these suite configs directly and sum results.
    external_strategy_configs:
      - "core_engine/config/catalog/suites/smoke_test_mom.yaml"
      - "core_engine/config/catalog/suites/smoke_test_mr.yaml"

  strategies:
    - type: "momentum"
      name: "MOM_SMS_ERAR_Gate"
      allocation_pct: 2.0
      parameters:
        enable_state_machine: false
        scan_all_bars: false
        scan_interval: 1

        enable_eod_liquidation: true
        eod_close_time: "15:55"
        enable_ads_multi_exit: true
        max_holding_minutes: 30
        enable_forward_vol_stops: true

        short_period: 10
        medium_period: 20
        long_period: 50
        lookback_period: 60

        composite_z_entry: 0.0
        composite_pct_entry: 50.0

        momentum_threshold: 0.02
        adx_threshold: 25.0
        volume_threshold: 1.2

        enable_ads_gates: true
        tau_0: 0.40
        sms_max_pending: 50
        sms_decay_rate: 0.05
        sms_mode: "multiplicative"
        sms_min_info_to_mature: 0.5
        sms_max_info: 12.0
        sms_prior_p0: 0.55
        sms_prior_strength_coef: 0.10
        sms_delay_penalty_per_bar: 0.02
        sms_w_setup_maturity: 1.10
        sms_w_setup_validity: 1.25
        sms_w_flow_support: 0.80
        sms_w_vol_compression: 0.60
        sms_info_w_volume: 0.55
        sms_info_w_volatility: 0.45
        sms_info_cap: 3.0

        enable_trend_persistence_filter: true
        trend_persistence_lookback: 10
        trend_persistence_min_ratio: 0.6

        enable_regime_adaptive_sizing: true
        erar_gamma: 0.10
        erar_tail_lambda: 1.0

        base_position_pct: 0.20
        max_position_pct: 0.15

    - type: "mean_reversion"
      name: "MR_Simple"
      allocation_pct: 1.0
      parameters:
        lookback_period: 30
        scan_all_bars: false
        scan_interval: 1
        enable_regime_filter: false
        enable_regime_adaptive_sizing: true

        tau_0: 0.40
        erar_gamma: 0.15
        sms_decay_rate: 0.05

        dislocation_minimum: 2.5
        dislocation_moderate: 2.5
        dislocation_strong: 3.0

        exhaustion_score_moderate: 55.0
        exhaustion_score_strong: 65.0

        rsi_oversold: 35
        rsi_overbought: 65

        base_position_pct: 0.10

        stop_loss_pct: -2.5
        take_profit_pct: 10.0
        min_profit_to_exit: 0.0

        enable_momentum_exit: true
        momentum_adx_threshold: 15.0
        momentum_rsi_overbought: 70.0
        momentum_rsi_oversold: 30.0
        momentum_volume_ratio: 0.7
        momentum_extended_zscore: 3.0

        zscore_entry_threshold: 1.5
        zscore_exit_threshold: 0.2

        enable_eod_liquidation: true
        eod_close_time: "15:55"
        enable_entry_cutoff: true
        entry_cutoff_time: "15:30"
        min_holding_bars: 10

  risk:
    allow_shorts: true
    min_signal_confidence: 0.40
    max_position_size: 0.25
    max_position_pct: 0.20
    max_positions: 2
    position_concentration_limit: 1.0
    daily_risk_budget_pct: 0.01
    per_trade_risk_pct: 0.005

  execution:
    test_mode: true
    initial_cash: 100000.0
    commission_per_share: 0.005
    min_commission: 1.0
    latency_ms_min: 0.0
    latency_ms_max: 0.0
    fill_probability: 1.0
    partial_fill_probability: 0.0
    slippage_bps_max: 5.0
    impact_coefficient: 10.0
    seed: 42
    use_historical_execution_simulator: true
