# Phase 2 Diagnostic Configuration
# Blueprint: docs/phase_1_2_implementation_blueprint.md v1.6-FINAL Section 2

diagnostic:
  # Hierarchical gate ordering
  gate_hierarchy:
    tier_1:
      - T1.1_continuation
      - T1.2_net_edge
      - T1.3_temporal_stability
      - T1.4_classification_correlation
    tier_2:
      - T2.1_magnitude_monotonicity
      - T2.2_regime_conditioning
      - T2.3_threshold_sweep
      - T2.4_elasticity_separability
      - T2.5_noise_resilience
    tier_3:
      - T3.1_conditional_slippage
      - T3.2_capacity_utilization
      - T3.3_cross_event_correlation
      - T3.4_event_beta
      - T3.5_self_impact
      - T3.6_edge_distribution

  # Tier 2/3 failure threshold
  tier2_max_failures: 2     # >=2 failures in Tier 2 → TERMINATE
  tier3_max_failures: 2     # >=2 failures in Tier 3 → TERMINATE

  # Intraday regime definitions
  intraday_regimes:
    opening: { start: "09:45", end: "10:15" }
    midday:  { start: "11:30", end: "13:30" }
    closing: { start: "14:00", end: "15:45" }

  # Output directory
  output_dir: "backtest/results/foundation_diagnostic"
