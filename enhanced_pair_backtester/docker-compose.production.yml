version: '3.8'

services:
  # Main trading application
  vnet-gds-trading:
    build:
      context: .
      dockerfile: Dockerfile
    image: vnet-gds-trading:latest
    container_name: vnet-gds-trading
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - CLICKHOUSE_HOST=clickhouse
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - PROMETHEUS_HOST=prometheus
    depends_on:
      - clickhouse
      - redis
      - postgres
      - prometheus
    ports:
      - "8000:8000"  # Metrics endpoint
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ClickHouse for market data storage
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-trading
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=polygon_data
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml
    networks:
      - trading-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Redis for caching and state management
  redis:
    image: redis:7-alpine
    container_name: redis-trading
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-trading123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for trade storage
  postgres:
    image: postgres:14-alpine
    container_name: postgres-trading
    restart: unless-stopped
    environment:
      - POSTGRES_DB=trading
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trading123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-trading
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - trading-network
    depends_on:
      - vnet-gds-trading

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-trading
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-trading123}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - trading-network
    depends_on:
      - prometheus

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: nginx-trading
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - trading-network
    depends_on:
      - vnet-gds-trading
      - grafana

  # Log aggregation with ELK stack (optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: elasticsearch-trading
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - trading-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: logstash-trading
    restart: unless-stopped
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logs:/var/log/trading
    networks:
      - trading-network
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: kibana-trading
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - trading-network
    depends_on:
      - elasticsearch

  # RabbitMQ for message queuing (optional)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-trading
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=trader
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-trading123}
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - trading-network

  # Backup service
  backup:
    image: alpine:latest
    container_name: backup-trading
    restart: "no"
    volumes:
      - postgres_data:/backup/postgres
      - clickhouse_data:/backup/clickhouse
      - redis_data:/backup/redis
      - ./backups:/backups
    command: |
      sh -c "
        apk add --no-cache postgresql-client &&
        while true; do
          pg_dump -h postgres -U trader -d trading > /backups/trading_\$(date +%Y%m%d_%H%M%S).sql
          tar -czf /backups/clickhouse_\$(date +%Y%m%d_%H%M%S).tar.gz -C /backup/clickhouse .
          tar -czf /backups/redis_\$(date +%Y%m%d_%H%M%S).tar.gz -C /backup/redis .
          find /backups -name '*.sql' -mtime +7 -delete
          find /backups -name '*.tar.gz' -mtime +7 -delete
          sleep 86400
        done
      "
    networks:
      - trading-network
    depends_on:
      - postgres
      - clickhouse
      - redis

volumes:
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  trading-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 