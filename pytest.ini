[pytest]
# Pytest Configuration for StatArb Gemini Test Suite
# ==================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Enhanced test discovery patterns
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for full workflows
    performance: Performance and load tests
    stress: Stress testing and resilience tests
    compliance: Regulatory compliance tests
    market_condition: Market condition testing
    slow: Tests that take longer than 5 seconds
    very_slow: Tests that take 30+ minutes (long-running stability tests)
    requires_data: Tests that require market data
    phase_2_4: Phase 2.4 enhanced component tests
    strategy_engine: Strategy engine component tests
    async_test: Asynchronous test cases
    latency: Latency performance tests
    memory: Memory profiling tests
    throughput: Throughput benchmarking tests
    production: Production readiness tests
    load_test: Load testing scenarios
    stress_test: Stress testing scenarios
    failover: Failover and recovery tests

# Output configuration
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --color=yes
    --durations=10
    --maxfail=5

# Minimum version
minversion = 6.0

# Async configuration
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pandas.*
    ignore::pytest.PytestAssertRewriteWarning
    ignore::RuntimeWarning:numpy.*
    ignore::FutureWarning:asyncio.*
    ignore::UserWarning:clickhouse.*
