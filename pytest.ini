[pytest]
testpaths = core_structure/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance tests
    migration: marks tests as migration tests

# Coverage settings
addopts = 
    --verbose
    --cov=core_structure
    --cov-report=term-missing
    --cov-report=html
    --cov-branch
    --no-cov-on-fail

# Coverage configuration
[coverage:run]
branch = True
source = core_structure

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError

# Ignore coverage for test files
omit =
    core_structure/tests/*
    standalone_tools/*
    setup.py

# Coverage HTML report settings
[coverage:html]
directory = coverage_html_report

# Test discovery
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv env virtualenv 