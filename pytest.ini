[tool:pytest]
# Pytest Configuration for StatArb Gemini Test Suite
# ==================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for full workflows
    performance: Performance and load tests
    slow: Tests that take longer than 5 seconds
    requires_data: Tests that require market data
    phase_2_4: Phase 2.4 enhanced component tests
    strategy_engine: Strategy engine component tests
    async_test: Asynchronous test cases

# Output configuration
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --cov=core_engine
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=80

# Minimum version
minversion = 6.0

# Test timeout (in seconds)
timeout = 300

# Async configuration
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pandas.*
    ignore::RuntimeWarning:numpy.*
