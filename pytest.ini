[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance tests

# Coverage settings
addopts = 
    --verbose
    --cov=enhanced_pair_backtester
    --cov-report=term-missing
    --cov-report=html
    --cov-branch
    --no-cov-on-fail

# Coverage configuration
[coverage:run]
branch = True
source = enhanced_pair_backtester

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError

# Ignore coverage for test files
omit =
    tests/*
    setup.py

# Coverage HTML report settings
[coverage:html]
directory = coverage_html_report

# Test discovery
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv env virtualenv 