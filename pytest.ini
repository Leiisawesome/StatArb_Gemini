[tool:pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Integration test specific settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --maxfail=5

# Markers for different test types
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    reliability: Reliability tests
    stress: Stress tests
    deployment: Deployment tests
    slow: Slow running tests
    bridge: Bridge architecture tests
    realtime: Real-time data tests
    endtoend: End-to-end tests

# Test execution settings
minversion = 6.0
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# Coverage settings (if pytest-cov is installed)
# addopts = --cov=core_structure --cov-report=term-missing --cov-report=html --cov-branch

# Timeout settings (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread 