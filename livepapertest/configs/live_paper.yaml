livepapertest:
  polygon:
    # API key is sourced from env POLYGON_API_KEY by default
    use_delayed: true
    symbols: ["TSLA", "NVDA"]
    data_types: ["minute_agg", "trade"]
    warmup:
      timeframe: "1min"
      warmup_required: 200
      warmup_days_max: 10

  ibkr:
    host: "127.0.0.1"
    port: 4002           # IB Gateway paper
    client_id: 1
    account_id: "DUM356784"
    paper_trading: true

  session:
    id_prefix: "lp"
    checkpoint_interval_bars: 1000
    stall_threshold_seconds: 60.0
    journal_compress: false
    checkpoint_dir: "livepapertest/results/checkpoints"
    journal_dir: "livepapertest/results/journals"

  dispatcher:
    max_queue_size: 20000
    bar_queue_size: 5000
    conflate_quotes: true

  buffers:
    size: 500
    warmup_required: 200

  risk:
    allow_shorts: false
    min_signal_confidence: 0.60
    max_position_size: 0.10
    max_position_pct: 0.05
    max_positions: 5
    position_concentration_limit: 0.15
    daily_risk_budget_pct: 0.01
    per_trade_risk_pct: 0.005

  execution:
    # Two-key gate: this must be true AND runner must be started with --enable-orders.
    enable_orders: false
    # Additional hard override via env LIVEPAPER_KILL_SWITCH=1
    max_price_age_seconds_block_orders: 3600
    ibkr_fill_timeout_seconds: 30.0
    ibkr_poll_interval_seconds: 0.25

  reconcile:
    positions_interval_sec: 15.0
    orders_interval_sec: 10.0
    pause_on_mismatch: true

  ops:
    health_log_interval_sec: 60.0

  # Strategies: mirrors core_engine StrategyManager.add_strategy config shape
  strategies:
    - name: "mean_reversion"
      type: "mean_reversion"
      active: true
      allocation_pct: 0.1
      max_positions: 3
      risk_limit: 0.05
      parameters:
        enable_eod_liquidation: false
        eod_close_time: "15:55"


