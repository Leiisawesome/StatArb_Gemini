# ================================================================================
# TESTING FRAMEWORK CONFIGURATION
# ================================================================================
# Central configuration for all backtesting parameters, trading periods, 
# universe selection, and test scenarios
# ================================================================================

# =============================================================================
# TRADING UNIVERSE CONFIGURATION
# =============================================================================
universe:
  # Primary symbols for testing
  symbols:
    - "TSLA"     # Tesla - High volatility momentum stock
    - "AAPL"     # Apple - Large cap stable
    - "MSFT"     # Microsoft - Tech momentum
    - "GOOGL"    # Google - Growth momentum
    - "NVDA"     # NVIDIA - High momentum tech
    - "SPY"      # S&P 500 ETF - Market benchmark
  
  # Symbol categories for different test scenarios
  categories:
    high_momentum: ["TSLA", "NVDA", "AMD"]
    large_cap: ["AAPL", "MSFT", "GOOGL"]
    etfs: ["SPY", "QQQ", "IWM"]
    volatile: ["TSLA", "NVDA", "GME", "AMC"]
    stable: ["AAPL", "MSFT", "JNJ", "PG"]

# =============================================================================
# TRADING PERIODS CONFIGURATION
# =============================================================================
trading_periods:
  # Quick test - Single trading day
  single_day:
    start_date: "2024-12-20"
    end_date: "2024-12-20"
    start_time: "09:30:00"
    end_time: "16:00:00"
    timezone: "US/Eastern"
    description: "Single trading day for quick validation"
  
  # Short test - One week
  one_week:
    start_date: "2024-12-16"
    end_date: "2024-12-20"
    start_time: "09:30:00"
    end_time: "16:00:00"
    timezone: "US/Eastern"
    description: "One week trading period"
  
  # Medium test - One month
  one_month:
    start_date: "2024-11-20"
    end_date: "2024-12-20"
    start_time: "09:30:00"
    end_time: "16:00:00"
    timezone: "US/Eastern"
    description: "One month comprehensive test"
  
  # Extended test - Three months
  three_months:
    start_date: "2024-09-20"
    end_date: "2024-12-20"
    start_time: "09:30:00"
    end_time: "16:00:00"
    timezone: "US/Eastern"
    description: "Three month extended backtest"
  
  # Full year test
  full_year:
    start_date: "2024-01-01"
    end_date: "2024-12-31"
    start_time: "09:30:00"
    end_time: "16:00:00"
    timezone: "US/Eastern"
    description: "Full year comprehensive analysis"
  
  # Custom period (can be overridden)
  custom:
    start_date: "2024-12-20"
    end_date: "2024-12-20"
    start_time: "09:30:00"
    end_time: "16:00:00"
    timezone: "US/Eastern"
    description: "Custom configurable period"

# =============================================================================
# DATA CONFIGURATION
# =============================================================================
data:
  # Data frequency settings
  intervals:
    - "1min"    # 1-minute bars
    - "5min"    # 5-minute bars
    - "15min"   # 15-minute bars
    - "1h"      # Hourly bars
    - "1d"      # Daily bars
  
  # Default interval for tests
  default_interval: "1min"
  
  # Data validation settings
  validation:
    enable_validation: true
    max_missing_data_pct: 5.0
    max_price_outlier_factor: 10.0
    max_timestamp_gap_minutes: 60
    max_zero_volume_pct: 20.0

# =============================================================================
# STRATEGY TEST CONFIGURATIONS
# =============================================================================
strategies:
  # Advanced Momentum Strategy Configuration
  advanced_momentum:
    template: "professional_momentum_v1"
    symbols: ["TSLA"]
    period: "single_day"
    interval: "1min"
    capital: 100000.0
    parameters:
      lookback_period: 20
      momentum_threshold: 0.015      # 1.5% threshold (was 0.6 = 60%)
      trend_lookback: 50
      regime_detection: true
      atr_multiplier: 2.0
      max_position_size: 0.15
      risk_limit: 0.02
    
  # Mean Reversion Strategy Configuration  
  mean_reversion:
    template: "professional_mean_reversion_v1"
    symbols: ["AAPL", "MSFT"]
    period: "one_week"
    interval: "5min"
    capital: 100000.0
    parameters:
      lookback_period: 20
      reversion_threshold: 2.0
      bollinger_period: 20
      bollinger_std: 2.0
      max_position_size: 0.20
      risk_limit: 0.015
  
  # Multi-Symbol Momentum Test
  multi_momentum:
    template: "professional_momentum_v1"
    symbols: ["TSLA", "NVDA", "AMD"]
    period: "one_week"
    interval: "1min"
    capital: 300000.0
    parameters:
      lookback_period: 15
      momentum_threshold: 0.02       # 2% threshold
      trend_lookback: 30
      regime_detection: true
      max_position_size: 0.10
      risk_limit: 0.015

# =============================================================================
# RISK MANAGEMENT CONFIGURATION
# =============================================================================
risk_management:
  # Global risk limits
  global:
    max_portfolio_risk: 0.02      # 2% max portfolio risk
    max_position_size: 0.20       # 20% max position size
    max_correlation_threshold: 0.7 # Max correlation between positions
    max_drawdown_limit: 0.10      # 10% max drawdown before halt
  
  # Stop loss configurations
  stop_loss:
    atr_multiplier: 2.0           # ATR-based stop loss
    trailing_stop_enabled: true
    trailing_stop_pct: 0.02       # 2% trailing stop
    time_based_exit: 390          # Exit after 390 minutes (6.5 hours)
  
  # Position sizing
  position_sizing:
    method: "volatility_adjusted"  # volatility_adjusted, fixed, kelly
    base_size: 0.10               # Base position size (10%)
    volatility_lookback: 20       # Periods for volatility calculation
    max_leverage: 1.0             # No leverage for testing

# =============================================================================
# PERFORMANCE METRICS CONFIGURATION
# =============================================================================
performance:
  # Metrics to calculate
  metrics:
    - "total_return"
    - "sharpe_ratio"
    - "max_drawdown"
    - "win_rate"
    - "profit_factor"
    - "sortino_ratio"
    - "calmar_ratio"
    - "value_at_risk"
  
  # Benchmarks for comparison
  benchmarks:
    - "SPY"     # S&P 500
    - "QQQ"     # NASDAQ
    - "cash"    # Risk-free rate
  
  # Risk-free rate (annual)
  risk_free_rate: 0.045  # 4.5% annual

# =============================================================================
# OUTPUT CONFIGURATION
# =============================================================================
output:
  # Logging levels
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  
  # Results format
  save_results: true
  results_format: ["json", "csv"]
  results_directory: "results/"
  
  # Charts and visualization
  generate_charts: true
  chart_formats: ["png", "html"]
  chart_directory: "charts/"
  
  # Reports
  generate_reports: true
  report_format: "html"
  report_directory: "reports/"

# =============================================================================
# EXECUTION CONFIGURATION
# =============================================================================
execution:
  # Parallel processing
  parallel_execution: false      # Single-threaded for debugging
  max_workers: 4                 # Max parallel workers when enabled
  
  # Memory management
  max_memory_usage_gb: 8.0       # Max memory usage
  garbage_collection: true       # Enable aggressive GC
  
  # Progress reporting
  progress_updates: true
  update_frequency: 100          # Update every N slices

# =============================================================================
# TEST SCENARIOS
# =============================================================================
scenarios:
  # Quick validation test
  quick_test:
    strategy: "advanced_momentum"
    symbols: ["TSLA"]
    period: "single_day"
    description: "Quick validation of momentum strategy"
  
  # Comprehensive single strategy test
  momentum_comprehensive:
    strategy: "advanced_momentum"
    symbols: ["TSLA", "NVDA"]
    period: "one_week"
    description: "Comprehensive momentum strategy validation"
  
  # Multi-strategy comparison
  strategy_comparison:
    strategies: ["advanced_momentum", "mean_reversion"]
    period: "one_month"
    description: "Compare momentum vs mean reversion strategies"
  
  # Market regime testing
  regime_test:
    strategy: "advanced_momentum"
    symbols: ["TSLA", "SPY"]
    period: "three_months"
    description: "Test strategy across different market regimes"
